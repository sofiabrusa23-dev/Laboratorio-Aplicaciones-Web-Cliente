<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Market</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<header> 

  <!-- Navbar -->   
<nav class="navbar navbar-expand-lg bg-white shadow-sm px-4 py-3">
  <div class="container-fluid d-flex align-items-center justify-content-between">

    <div class="d-flex align-items-center gap-4">
      <a class="navbar-brand fw-bold fs-3" href="#">
        E-Market
      </a>
      
      <a class="nav-link fw-semibold" href="#">
        Home
      </a>

    </div>
   

    <div class="d-flex align-items-center gap-4">

      <div class="search-box d-flex align-items-center">
        <img src="./src/Icons/lupa.svg" alt="Buscar" class="search-icon">

        <input 
          type="search"
          class="search-input"
          placeholder="Buscar productos..."
          aria-label="Buscar productos"
        >
      </div>

      <a href="carrito.html" class="cart-icon" aria-label="Carrito">
        <img src="./src/Icons/carrito.svg" alt="Carrito de compras">
      </a>

    </div>

  </div>
</nav>


  <!-- Carousell -->
    <div id="carouselExampleIndicators" class="carousel slide">
  <div class="carousel-indicators">
    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1" aria-label="Slide 2"></button>
    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2" aria-label="Slide 3"></button>
    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="3" aria-label="Slide 4"></button>
  </div>
  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="./src/carousell/01.png" class="d-block w-100" alt="imagen 1">
    </div>
    <div class="carousel-item">
      <img src="./src/carousell/02.png" class="d-block w-100" alt="imagen 2">
    </div>
    <div class="carousel-item">
      <img src="./src/carousell/03.png" class="d-block w-100" alt="imagen 3">
    </div>
    <div class="carousel-item">
      <img src="./src/carousell/04.png" class="d-block w-100" alt="imagen 4">
    </div>
  </div>
  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Previous</span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Next</span>
  </button>
</div>


  <!-- Seccion principal -->
    <main>
      <div class="container" >
        <h1>Todo lo que necesitás, en un solo lugar</h1>
        <p>Descubrí productos seleccionados, ofertas especiales y novedades para vos.</p>

        <section id="products" class="productos-container">
            <!-- Renderizarán los productos dinamicamente -->
        </section>
        
        <div class="modal-producto" id="modalProducto">
          <div class="modal-producto_contenido">

            <button class="modal-producto_cerrar" id="cerrarModal">×</button>

            <div class="modal-producto_imagen-contenedor">
              <img id="modalImagen" src="" alt="" class="modal-producto_imagen">
            </div>

            <div class="modal-producto_info">
              <h2 id="modalTitulo" class="modal-producto_titulo"></h2>
              <p id="modalCategoria" class="modal-producto_categoria"></p>
              <p id="modalDescripcion" class="modal-producto_descripcion"></p>
              <p id="modalPrecio" class="modal-producto_precio"></p>

              <button class="modal-producto_boton">
                Agregar al carrito
              </button>
            </div>

          </div>
        </div>

      </div>
    </main>




</header>
    



<script src="app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
